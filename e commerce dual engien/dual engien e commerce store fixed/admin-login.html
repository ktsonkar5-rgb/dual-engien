<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Admin Login | NOVA MARKET</title>

    <link
        rel="stylesheet"
        href="admin-login.css"
    >

</head>


<body>


    <main class="login-container">


        <div class="login-card">


            <div class="login-logo">

                <span>NOVA</span>

                <strong>MARKET</strong>

            </div>


            <p class="login-label">

                ADMIN CONTROL CENTER

            </p>


            <h1>

                Welcome Back

            </h1>


            <p class="login-description">

                Sign in to manage your marketplace.

            </p>


            <form id="adminLoginForm">


                <div class="input-group">

                    <label>

                        Username

                    </label>


                    <input

                        type="text"

                        id="username"

                        placeholder="Enter admin username"

                        required

                    >

                </div>


                <div class="input-group">

                    <label>

                        Password

                    </label>


                    <input

                        type="password"

                        id="password"

                        placeholder="Enter password"

                        required

                    >

                </div>


                <button

                    type="submit"

                    class="login-btn"

                >

                    Login to Dashboard

                </button>


                <p

                    id="loginMessage"

                    class="login-message"

                ></p>


            </form>


        </div>


    </main>


    <script src="admin-login.js"></script>


</body>

</html>
