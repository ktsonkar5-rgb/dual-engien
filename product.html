<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Product Details | NOVA MARKET</title>

    <meta
        name="description"
        content="View detailed product information at NOVA MARKET."
    >

    <link
        rel="stylesheet"
        href="css/product.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

</head>


<body>


    <!-- =====================================
         HEADER
    ====================================== -->

    <header class="product-header">

        <a
            href="index.html"
            class="back-home"
        >

            <i class="fa-solid fa-arrow-left"></i>

            Back to Store

        </a>


        <a
            href="index.html"
            class="product-logo"
        >

            NOVA<span>MARKET</span>

        </a>


        <a
            href="index.html#featured"
            class="header-cart-link"
        >

            <i class="fa-solid fa-cart-shopping"></i>

            <span class="cart-count">
                0
            </span>

        </a>

    </header>



    <!-- =====================================
         PRODUCT DETAILS
    ====================================== -->

    <main class="product-details-container">

        <div
            id="productDetails"
            class="product-details"
        >

            <div class="product-loading">

                <i class="fa-solid fa-spinner fa-spin"></i>

                <p>
                    Loading product...
                </p>

            </div>

        </div>

    </main>



    <!-- =====================================
         RELATED PRODUCTS
    ====================================== -->

    <section
        class="related-section"
        id="relatedSection"
    >

        <div class="section-heading">

            <span>
                YOU MAY ALSO LIKE
            </span>

            <h2>
                Related Products
            </h2>

        </div>


        <div
            id="relatedProducts"
            class="related-products"
        >

        </div>

    </section>



    <!-- =====================================
         FOOTER
    ====================================== -->

    <footer class="product-footer">

        <p>
            © 2026 NOVA MARKET. All rights reserved.
        </p>

    </footer>



    <script src="js/product.js"></script>

</body>

</html>
